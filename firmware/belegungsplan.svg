  <text x="20" y="28" class="t1">ESP32 DevKitC · WROOM-32E-N4 — Belegung mit Leitungsverläufen</text>
  <text x="20" y="48" class="t2">38-Pin-Layout, physische Reihenfolge · 4 MB, kein PSRAM (IO16/17 frei) · Variante A (nativ)</text>

