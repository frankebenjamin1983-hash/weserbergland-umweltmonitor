  <rect x="567" y="324" width="8" height="8" fill="#1D9E75"/><text x="581" y="331" class="labU">IO35</text>
  <line class="w" stroke="#1D9E75" x1="360" y1="328" x2="567" y2="328"/>
  <!-- 6 IO32 -->
  <rect x="567" y="356" width="8" height="8" fill="#1D9E75"/><text x="581" y="363" class="labU">IO32</text>
  <line class="w" stroke="#1D9E75" x1="360" y1="360" x2="567" y2="360"/>
  <!-- 7 IO33 -->
  <rect x="567" y="388" width="8" height="8" fill="#6b6a64"/><text x="581" y="395" class="lab">IO33</text>
  <!-- 8 IO25 -->
  <rect x="567" y="420" width="8" height="8" fill="#6b6a64"/><text x="581" y="427" class="lab">IO25</text>
  <!-- 9 IO26 -->
  <rect x="567" y="452" width="8" height="8" fill="#EF9F27"/><text x="581" y="459" class="labU">IO26</text>
  <polyline class="w" stroke="#EF9F27" points="360,456 470,456 470,343 360,343"/>
  <!-- 10 IO27 -->
  <rect x="567" y="484" width="8" height="8" fill="#EF9F27"/><text x="581" y="491" class="labU">IO27</text>
  <line class="w" stroke="#EF9F27" x1="360" y1="488" x2="567" y2="488"/>
  <!-- 11 IO14 -->
  <rect x="567" y="516" width="8" height="8" fill="#EF9F27"/><text x="581" y="523" class="labU">IO14</text>
  <line class="w" stroke="#EF9F27" x1="360" y1="520" x2="567" y2="520"/>
  <!-- 12 IO12 -->
  <rect x="567" y="548" width="8" height="8" fill="#6b6a64"/><text x="581" y="555" class="lab">IO12 s</text>
  <!-- 13 GND -->
  <rect x="567" y="580" width="8" height="8" fill="#5F5E5A"/><text x="581" y="587" class="labU">GND</text>
  <line class="w" stroke="#5F5E5A" x1="567" y1="584" x2="68" y2="584"/><circle cx="68" cy="584" r="3" fill="#5F5E5A"/>
  <!-- 14 IO13 -->
  <rect x="567" y="612" width="8" height="8" fill="#D4537E"/><text x="581" y="619" class="labU">IO13</text>
  <line class="w" stroke="#D4537E" x1="360" y1="616" x2="567" y2="616"/>
  <!-- 15 IO9 -->
  <rect x="567" y="644" width="8" height="8" fill="#6b6a64"/><text x="581" y="651" class="lab">IO9 f</text>
  <!-- 16 IO10 -->
  <rect x="567" y="676" width="8" height="8" fill="#6b6a64"/><text x="581" y="683" class="lab">IO10 f</text>
  <!-- 17 IO11 -->
  <rect x="567" y="708" width="8" height="8" fill="#6b6a64"/><text x="581" y="715" class="lab">IO11 f</text>
