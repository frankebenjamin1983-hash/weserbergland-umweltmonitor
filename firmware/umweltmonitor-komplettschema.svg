  <rect x="155" y="946" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#EF9F27"/><text x="172" y="956" class="leg">Digital/1-Wire</text>
  <rect x="270" y="946" width="12" height="12" rx="3" fill="#FBEAF0" stroke="#D4537E"/><text x="287" y="956" class="leg">PWM</text>
