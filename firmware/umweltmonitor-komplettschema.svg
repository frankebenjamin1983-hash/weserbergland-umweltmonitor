  <rect x="715" y="580" width="8" height="8" fill="#6b6a64"/><text x="709" y="587" text-anchor="end" class="lab">IO0 s</text>
  <rect x="715" y="612" width="8" height="8" fill="#6b6a64"/><text x="709" y="619" text-anchor="end" class="lab">IO2 s</text>
  <rect x="715" y="644" width="8" height="8" fill="#6b6a64"/><text x="709" y="651" text-anchor="end" class="lab">IO15 s</text>
  <rect x="715" y="676" width="8" height="8" fill="#6b6a64"/><text x="709" y="683" text-anchor="end" class="lab">IO8 f</text>
  <rect x="715" y="708" width="8" height="8" fill="#6b6a64"/><text x="709" y="715" text-anchor="end" class="lab">IO7 f</text>
  <rect x="715" y="740" width="8" height="8" fill="#6b6a64"/><text x="709" y="747" text-anchor="end" class="lab">IO6 f</text>

  <!-- ===== LEFT COMPONENTS ===== -->
  <!-- power taps helper: VCC->3V3(44), GND->GND(68) -->
  <!-- A HW-390 @232 -->
  <line class="w" stroke="#D85A30" x1="44" y1="226" x2="130" y2="226"/>
  <line class="w" stroke="#5F5E5A" x1="68" y1="238" x2="130" y2="238"/>
  <rect x="130" y="218" width="230" height="30" rx="5" fill="#E1F5EE" stroke="#1D9E75"/>
  <text x="138" y="231" class="ct">HW-390</text><text x="138" y="243" class="cs">Bodenfeuchte · AOUT→IO36</text>
  <!-- B HW-038 @264 (gated VCC) -->
  <line class="w" stroke="#D85A30" stroke-dasharray="5 3" x1="104" y1="260" x2="130" y2="260"/>
  <line class="w" stroke="#5F5E5A" x1="68" y1="272" x2="130" y2="272"/>
  <rect x="130" y="250" width="230" height="30" rx="5" fill="#E1F5EE" stroke="#1D9E75"/>
  <text x="138" y="263" class="ct">HW-038</text><text x="138" y="275" class="cs">Wasserstand · S→IO39 · VCC gated</text>
  <!-- C MAX9814 @296 -->
  <line class="w" stroke="#D85A30" x1="44" y1="290" x2="130" y2="290"/>
  <line class="w" stroke="#5F5E5A" x1="68" y1="302" x2="130" y2="302"/>
  <rect x="130" y="282" width="230" height="30" rx="5" fill="#E1F5EE" stroke="#1D9E75"/>
  <text x="138" y="295" class="ct">MAX9814</text><text x="138" y="307" class="cs">Schall · OUT→IO34</text>
  <!-- D MiCS-5524 @328 -->
  <line class="w" stroke="#C77F0A" x1="20" y1="322" x2="130" y2="322"/>
  <line class="w" stroke="#5F5E5A" x1="68" y1="334" x2="130" y2="334"/>
  <rect x="130" y="314" width="230" height="30" rx="5" fill="#E1F5EE" stroke="#1D9E75"/>
  <text x="138" y="327" class="ct">MiCS-5524</text><text x="138" y="339" class="cs">Gas · AOUT→IO35 · Heizer 5V/Gate IO26</text>
  <!-- E GUVA @360 -->
  <line class="w" stroke="#D85A30" x1="44" y1="354" x2="130" y2="354"/>
  <line class="w" stroke="#5F5E5A" x1="68" y1="366" x2="130" y2="366"/>
  <rect x="130" y="346" width="230" height="30" rx="5" fill="#E1F5EE" stroke="#1D9E75"/>
  <text x="138" y="359" class="ct">GUVA-S12SD</text><text x="138" y="371" class="cs">UV · AOUT→IO32</text>
  <!-- F Raindrop @488 (gated) -->
  <line class="w" stroke="#D85A30" stroke-dasharray="5 3" x1="104" y1="482" x2="130" y2="482"/>
  <line class="w" stroke="#5F5E5A" x1="68" y1="494" x2="130" y2="494"/>
  <rect x="130" y="474" width="230" height="30" rx="5" fill="#FAEEDA" stroke="#EF9F27"/>
  <text x="138" y="487" class="ct">Raindrop</text><text x="138" y="499" class="cs">Regen · DO→IO27 · VCC gated</text>
  <!-- G Power-Gate MOSFET @520 -->
  <line class="w" stroke="#D85A30" x1="44" y1="528" x2="130" y2="528"/>
  <polyline class="w" stroke="#D85A30" stroke-dasharray="5 3" points="130,512 104,512 104,500"/>
  <rect x="130" y="506" width="230" height="30" rx="5" fill="#FAEEDA" stroke="#EF9F27"/>
  <text x="138" y="519" class="ct">Power-Gate (N-MOSFET)</text><text x="138" y="531" class="cs">Gate←IO14 · schaltet HW-038 + Raindrop</text>
  <!-- H Servo @616 -->
  <line class="w" stroke="#C77F0A" x1="20" y1="610" x2="130" y2="610"/>
  <line class="w" stroke="#5F5E5A" x1="68" y1="622" x2="130" y2="622"/>
  <rect x="130" y="602" width="230" height="30" rx="5" fill="#FBEAF0" stroke="#D4537E"/>
  <text x="138" y="615" class="ct">Servo SG90</text><text x="138" y="627" class="cs">PWM←IO13 · +5V (+Elko)</text>

  <!-- ===== RIGHT COMPONENTS ===== -->
  <!-- I I2C-0 group @222..342 -->
  <line class="w" stroke="#D85A30" x1="1256" y1="240" x2="1190" y2="240"/>
  <line class="w" stroke="#5F5E5A" x1="1232" y1="330" x2="1190" y2="330"/>
  <rect x="940" y="222" width="250" height="120" rx="6" fill="#E6F1FB" stroke="#378ADD"/>
  <text x="950" y="240" class="ct">I²C-Bus 0  (SDA IO21 / SCL IO22)</text>
  <text x="950" y="258" class="cs">AHT20  0x38  — Temp/Feuchte</text>
  <text x="950" y="274" class="cs">BMP280 0x76  — Luftdruck</text>
  <text x="950" y="290" class="cs">TCS34725 0x29 — Farbe</text>
  <text x="950" y="306" class="cs">LCD 0x27 — Display (optional)</text>
  <text x="950" y="326" class="cs" fill="#185FA5">Pull-ups 2×4k7 → 3V3 · VCC/GND → Rails</text>
