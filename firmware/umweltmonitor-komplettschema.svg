<svg viewBox="0 0 1300 980" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="1300" height="980" fill="#ffffff"/>
  <style>
    .lab{font-family:Consolas,monospace;font-size:9.5px;fill:#9a988f}
    .labU{font-family:Consolas,monospace;font-size:9.5px;font-weight:700;fill:#f1efe8}
    .ct{font-size:11px;font-weight:700;fill:#1b1b1b}
    .cs{font-size:9px;fill:#444}
    .rl{font-size:10px;font-weight:700}
    .leg{font-size:10.5px;fill:#5a5a5a}
    .t1{font-size:18px;font-weight:700;fill:#1b1b1b}
    .t2{font-size:11.5px;fill:#5a5a5a}
    .w{stroke-width:2;fill:none}
    .chip{font-size:7.5px;font-weight:700;fill:#854F0B}
  </style>

  <text x="20" y="30" class="t1">Umweltmonitor — Komplett-Anschlussschema (ESP32-D · DevKitC 38-Pin)</text>
  <text x="20" y="50" class="t2">Station + Umwelt · Variante A (nativ) · 2 I²C-Busse · alle Sensoren, Servo, Power-Gate, Pull-ups</text>

  <!-- ===== POWER RAILS ===== -->
  <!-- left rails: 5V x20, 3V3 x44, GND x68 -->
  <line class="w" stroke="#C77F0A" x1="20" y1="300" x2="20" y2="770"/>
  <text x="14" y="295" class="rl" fill="#C77F0A">5V</text>
  <line class="w" stroke="#D85A30" x1="44" y1="138" x2="44" y2="770"/>
  <text x="38" y="132" class="rl" fill="#D85A30">3V3</text>
  <line class="w" stroke="#5F5E5A" x1="68" y1="168" x2="68" y2="912"/>
  <text x="62" y="930" class="rl" fill="#5F5E5A">GND</text>
  <!-- right rails: GND x1232, 3V3 x1256 -->
  <line class="w" stroke="#5F5E5A" x1="1232" y1="168" x2="1232" y2="912"/>
  <text x="1216" y="930" class="rl" fill="#5F5E5A">GND</text>
  <line class="w" stroke="#D85A30" x1="1256" y1="138" x2="1256" y2="610"/>
  <text x="1250" y="132" class="rl" fill="#D85A30">3V3</text>
  <!-- ties -->
  <line class="w" stroke="#D85A30" x1="44" y1="138" x2="1256" y2="138"/>
  <line class="w" stroke="#5F5E5A" x1="68" y1="912" x2="1232" y2="912"/>
  <!-- gated 3V3 rail (switched by MOSFET) -->
  <line class="w" stroke="#D85A30" stroke-dasharray="5 3" x1="104" y1="258" x2="104" y2="500"/>
  <text x="108" y="256" class="cs" fill="#D85A30">3V3 (gated)</text>

  <!-- ===== ESP32 BOARD ===== -->
  <rect x="575" y="152" width="140" height="624" rx="10" fill="#2c2c2a"/>
  <rect x="625" y="144" width="40" height="9" rx="3" fill="#5f5e5a"/>
  <text x="645" y="792" text-anchor="middle" class="cs" fill="#888780">ESP32-D · WROOM-32E-N4 · USB unten</text>

  <!-- LEFT pins y=168+32*i -->
  <!-- 0 3V3 -->
  <rect x="567" y="164" width="8" height="8" fill="#D85A30"/><text x="581" y="171" class="labU">3V3</text>
  <line class="w" stroke="#D85A30" x1="567" y1="168" x2="44" y2="168"/><circle cx="44" cy="168" r="3" fill="#D85A30"/>
  <!-- 1 EN -->
  <rect x="567" y="196" width="8" height="8" fill="#6b6a64"/><text x="581" y="203" class="lab">EN</text>
  <!-- 2 IO36 -->
  <rect x="567" y="228" width="8" height="8" fill="#1D9E75"/><text x="581" y="235" class="labU">IO36</text>
  <line class="w" stroke="#1D9E75" x1="360" y1="232" x2="567" y2="232"/>
  <!-- 3 IO39 -->
  <rect x="567" y="260" width="8" height="8" fill="#1D9E75"/><text x="581" y="267" class="labU">IO39</text>
  <line class="w" stroke="#1D9E75" x1="360" y1="264" x2="567" y2="264"/>
