  <rect x="567" y="740" width="8" height="8" fill="#C77F0A"/><text x="581" y="747" class="labU">5V</text>
  <line class="w" stroke="#C77F0A" x1="567" y1="744" x2="20" y2="744"/><circle cx="20" cy="744" r="3" fill="#C77F0A"/>

  <!-- RIGHT pins -->
  <rect x="715" y="164" width="8" height="8" fill="#5F5E5A"/><text x="709" y="171" text-anchor="end" class="labU">GND</text>
  <line class="w" stroke="#5F5E5A" x1="723" y1="168" x2="1232" y2="168"/><circle cx="1232" cy="168" r="3" fill="#5F5E5A"/>
  <rect x="715" y="196" width="8" height="8" fill="#6b6a64"/><text x="709" y="203" text-anchor="end" class="lab">IO23</text>
  <rect x="715" y="228" width="8" height="8" fill="#378ADD"/><text x="709" y="235" text-anchor="end" class="labU">IO22</text>
  <line class="w" stroke="#378ADD" x1="723" y1="232" x2="940" y2="250"/>
  <rect x="715" y="260" width="8" height="8" fill="#6b6a64"/><text x="709" y="267" text-anchor="end" class="lab">TX0</text>
  <rect x="715" y="292" width="8" height="8" fill="#6b6a64"/><text x="709" y="299" text-anchor="end" class="lab">RX0</text>
  <rect x="715" y="324" width="8" height="8" fill="#378ADD"/><text x="709" y="331" text-anchor="end" class="labU">IO21</text>
  <line class="w" stroke="#378ADD" x1="723" y1="328" x2="940" y2="306"/>
  <rect x="715" y="356" width="8" height="8" fill="#5F5E5A"/><text x="709" y="363" text-anchor="end" class="labU">GND</text>
  <line class="w" stroke="#5F5E5A" x1="723" y1="360" x2="1232" y2="360"/><circle cx="1232" cy="360" r="3" fill="#5F5E5A"/>
  <rect x="715" y="388" width="8" height="8" fill="#6b6a64"/><text x="709" y="395" text-anchor="end" class="lab">IO19</text>
  <rect x="715" y="420" width="8" height="8" fill="#6b6a64"/><text x="709" y="427" text-anchor="end" class="lab">IO18</text>
  <rect x="715" y="452" width="8" height="8" fill="#6b6a64"/><text x="709" y="459" text-anchor="end" class="lab">IO5 s</text>
  <rect x="715" y="484" width="8" height="8" fill="#378ADD"/><text x="709" y="491" text-anchor="end" class="labU">IO17</text>
  <line class="w" stroke="#378ADD" x1="723" y1="488" x2="940" y2="496"/>
  <rect x="715" y="516" width="8" height="8" fill="#378ADD"/><text x="709" y="523" text-anchor="end" class="labU">IO16</text>
