  <line class="w" stroke="#5F5E5A" x1="1232" y1="520" x2="1190" y2="520"/>
  <rect x="940" y="470" width="250" height="62" rx="6" fill="#E6F1FB" stroke="#378ADD"/>
  <text x="950" y="488" class="ct">TSL2591  (I²C-Bus 1)</text>
  <text x="950" y="504" class="cs">Lux 0x29 · SDA IO16 / SCL IO17</text>
  <text x="950" y="520" class="cs" fill="#185FA5">Pull-ups 2×4k7 → 3V3 · eigener Bus (0x29)</text>
  <!-- K DS18B20 @540..580 -->
  <line class="w" stroke="#D85A30" x1="1256" y1="548" x2="1190" y2="548"/>
  <line class="w" stroke="#5F5E5A" x1="1232" y1="572" x2="1190" y2="572"/>
  <rect x="940" y="540" width="250" height="40" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-dasharray="5 3"/>
  <text x="950" y="556" class="ct">DS18B20 — Bodentemp · DQ→IO4</text>
  <text x="950" y="572" class="cs">4k7 Pull-up DQ→3V3 · wasserdichte Sonde</text>
  <rect x="1118" y="543" width="64" height="14" rx="4" fill="#fff" stroke="#854F0B"/><text x="1150" y="553" text-anchor="middle" class="chip">VORSCHLAG</text>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="946" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#1D9E75"/><text x="37" y="956" class="leg">Analog</text>
