  <rect x="520" y="265" width="8" height="10" fill="#D3D1C7"/><text x="514" y="273.5" text-anchor="end" class="lab">RX0·3</text>

  <line class="w" stroke="#378ADD" x1="528" y1="310" x2="560" y2="276"/>
  <rect x="520" y="305" width="8" height="10" fill="#378ADD"/><text x="514" y="313.5" text-anchor="end" class="labU">21</text>
