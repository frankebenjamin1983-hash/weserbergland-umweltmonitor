  <text x="568" y="256" class="tg">I²C-Bus 0  (SDA IO21 / SCL IO22)</text>
  <text x="568" y="276" class="tgs">AHT20 · BMP280 · TCS34725  (+LCD opt.)</text>

  <rect x="520" y="345" width="8" height="10" fill="#D3D1C7"/><text x="514" y="353.5" text-anchor="end" class="lab">19</text>
  <rect x="520" y="385" width="8" height="10" fill="#D3D1C7"/><text x="514" y="393.5" text-anchor="end" class="lab">18</text>
  <rect x="520" y="425" width="8" height="10" fill="#D3D1C7"/><text x="514" y="433.5" text-anchor="end" class="lab">5 strap</text>

  <line class="w" stroke="#378ADD" x1="528" y1="470" x2="560" y2="484"/>
  <rect x="520" y="465" width="8" height="10" fill="#378ADD"/><text x="514" y="473.5" text-anchor="end" class="labU">17</text>
  <line class="w" stroke="#378ADD" x1="528" y1="510" x2="560" y2="500"/>
  <rect x="520" y="505" width="8" height="10" fill="#378ADD"/><text x="514" y="513.5" text-anchor="end" class="labU">16</text>
  <rect x="560" y="472" width="300" height="40" rx="6" fill="#E6F1FB" stroke="#378ADD"/>
  <text x="568" y="487" class="tg">I²C-Bus 1  (SDA IO16 / SCL IO17)</text>
  <text x="568" y="503" class="tgs">TSL2591 · Lux (0x29 → eigener Bus)</text>

  <line class="w" stroke="#EF9F27" stroke-dasharray="5 3" x1="528" y1="550" x2="560" y2="550"/>
  <rect x="520" y="545" width="8" height="10" fill="#EF9F27"/><text x="514" y="553.5" text-anchor="end" class="labU">4</text>
  <rect x="560" y="537" width="300" height="26" rx="5" fill="#FAEEDA" stroke="#854F0B" stroke-dasharray="5 3"/>
  <text x="568" y="553.5" class="tg">DS18B20 · DQ (Bodentemp, 4,7 kΩ)</text>
  <rect x="792" y="541" width="62" height="14" rx="4" fill="#fff" stroke="#854F0B"/><text x="823" y="551" text-anchor="middle" class="chip">VORSCHLAG</text>

  <rect x="520" y="585" width="8" height="10" fill="#D3D1C7"/><text x="514" y="593.5" text-anchor="end" class="lab">2 strap</text>
  <rect x="520" y="625" width="8" height="10" fill="#D3D1C7"/><text x="514" y="633.5" text-anchor="end" class="lab">15 strap</text>

  <line class="w" stroke="#5F5E5A" x1="528" y1="670" x2="560" y2="670"/>
  <rect x="520" y="665" width="8" height="10" fill="#5F5E5A"/><text x="514" y="673.5" text-anchor="end" class="labU">GND</text>
  <rect x="560" y="657" width="300" height="26" rx="5" fill="#F1EFE8" stroke="#5F5E5A"/><text x="568" y="673.5" class="tg">GND → Masse (I²C / Sensoren)</text>

  <line class="w" stroke="#D85A30" x1="528" y1="710" x2="560" y2="710"/>
  <rect x="520" y="705" width="8" height="10" fill="#D85A30"/><text x="514" y="713.5" text-anchor="end" class="labU">3V3</text>
  <rect x="560" y="697" width="300" height="26" rx="5" fill="#FAECE7" stroke="#D85A30"/><text x="568" y="713.5" class="tg">3V3 → Sensoren-VCC + I²C-Pull-ups</text>

  <!-- LEGEND -->
  <rect x="20" y="772" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#1D9E75"/><text x="37" y="782" class="leg">Analog ADC1</text>
  <rect x="135" y="772" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#378ADD"/><text x="152" y="782" class="leg">I²C</text>
  <rect x="190" y="772" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#EF9F27"/><text x="207" y="782" class="leg">Digital / 1-Wire</text>
  <rect x="315" y="772" width="12" height="12" rx="3" fill="#FBEAF0" stroke="#D4537E"/><text x="332" y="782" class="leg">PWM</text>
  <rect x="375" y="772" width="12" height="12" rx="3" fill="#FAECE7" stroke="#D85A30"/><text x="392" y="782" class="leg">Versorgung</text>
  <text x="480" y="782" class="leg" font-style="italic">grau = unbenutzt · „strap" frei lassen · ┄ = Vorschlag/offen (DS18B20)</text>
