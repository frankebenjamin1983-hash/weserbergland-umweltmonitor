<svg viewBox="0 0 900 800" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="800" fill="#ffffff"/>
  <style>
    .lab{font-family:Consolas,monospace;font-size:10px;fill:#9a988f}
    .labU{font-family:Consolas,monospace;font-size:10px;font-weight:700;fill:#f1efe8}
    .tg{font-size:9.5px;fill:#1b1b1b}
    .tgs{font-size:8.5px;fill:#5a5a5a}
    .w{stroke-width:2;fill:none}
    .t1{font-size:17px;font-weight:700;fill:#1b1b1b}
    .t2{font-size:11.5px;fill:#5a5a5a}
    .leg{font-size:10.5px;fill:#5a5a5a}
    .chip{font-size:7.5px;font-weight:700;fill:#854F0B}
  </style>

  <text x="20" y="28" class="t1">ESP32 DOIT DevKit V1 (30-Pin) — Belegung mit Leitungsverläufen</text>
  <text x="20" y="48" class="t2">30-Pin-Layout, physische Reihenfolge · Variante A (nativ) · UmweltMonitor (Station + Umwelt)</text>

  <rect x="380" y="130" width="140" height="620" rx="10" fill="#2c2c2a"/>
  <rect x="430" y="122" width="40" height="10" rx="3" fill="#5f5e5a"/>
  <text x="450" y="768" text-anchor="middle" class="tgs" fill="#888780">USB (unten)</text>

  <!-- LEFT PINS  y = 150 + 40*i -->
  <rect x="372" y="145" width="8" height="10" fill="#D3D1C7"/><text x="386" y="153.5" class="lab">EN</text>

  <line class="w" stroke="#1D9E75" x1="360" y1="190" x2="372" y2="190"/>
  <rect x="372" y="185" width="8" height="10" fill="#1D9E75"/><text x="386" y="193.5" class="labU">36·VP</text>
  <rect x="150" y="177" width="210" height="26" rx="5" fill="#E1F5EE" stroke="#1D9E75"/><text x="158" y="193.5" class="tg">HW-390 · AOUT (Bodenfeuchte)</text>

  <line class="w" stroke="#1D9E75" x1="360" y1="230" x2="372" y2="230"/>
  <rect x="372" y="225" width="8" height="10" fill="#1D9E75"/><text x="386" y="233.5" class="labU">39·VN</text>
  <rect x="150" y="217" width="210" height="26" rx="5" fill="#E1F5EE" stroke="#1D9E75"/><text x="158" y="233.5" class="tg">HW-038 · S (Wasserstand)</text>

  <line class="w" stroke="#1D9E75" x1="360" y1="270" x2="372" y2="270"/>
  <rect x="372" y="265" width="8" height="10" fill="#1D9E75"/><text x="386" y="273.5" class="labU">34</text>
  <rect x="150" y="257" width="210" height="26" rx="5" fill="#E1F5EE" stroke="#1D9E75"/><text x="158" y="273.5" class="tg">MAX9814 · OUT (Schall)</text>

  <line class="w" stroke="#1D9E75" x1="360" y1="310" x2="372" y2="310"/>
  <rect x="372" y="305" width="8" height="10" fill="#1D9E75"/><text x="386" y="313.5" class="labU">35</text>
  <rect x="150" y="297" width="210" height="26" rx="5" fill="#E1F5EE" stroke="#1D9E75"/><text x="158" y="313.5" class="tg">MiCS-5524 · AOUT (Gas)</text>

  <line class="w" stroke="#1D9E75" x1="360" y1="350" x2="372" y2="350"/>
  <rect x="372" y="345" width="8" height="10" fill="#1D9E75"/><text x="386" y="353.5" class="labU">32</text>
  <rect x="150" y="337" width="210" height="26" rx="5" fill="#E1F5EE" stroke="#1D9E75"/><text x="158" y="353.5" class="tg">GUVA-S12SD · AOUT (UV)</text>

  <line class="w" stroke="#B4B2A9" x1="360" y1="390" x2="372" y2="390"/>
  <rect x="372" y="385" width="8" height="10" fill="#B4B2A9"/><text x="386" y="393.5" class="labU">33</text>
  <rect x="150" y="377" width="210" height="26" rx="5" fill="#F1EFE8" stroke="#B4B2A9"/><text x="158" y="393.5" class="tg">frei (Reserve / Raindrop-AO)</text>

  <rect x="372" y="425" width="8" height="10" fill="#D3D1C7"/><text x="386" y="433.5" class="lab">25</text>

  <line class="w" stroke="#EF9F27" x1="360" y1="470" x2="372" y2="470"/>
  <rect x="372" y="465" width="8" height="10" fill="#EF9F27"/><text x="386" y="473.5" class="labU">26</text>
  <rect x="150" y="457" width="210" height="26" rx="5" fill="#FAEEDA" stroke="#EF9F27"/><text x="158" y="473.5" class="tg">MiCS · Heizer-Gate (MOSFET)</text>

  <line class="w" stroke="#EF9F27" x1="360" y1="510" x2="372" y2="510"/>
  <rect x="372" y="505" width="8" height="10" fill="#EF9F27"/><text x="386" y="513.5" class="labU">27</text>
  <rect x="150" y="497" width="210" height="26" rx="5" fill="#FAEEDA" stroke="#EF9F27"/><text x="158" y="513.5" class="tg">Raindrop · DO</text>

  <line class="w" stroke="#EF9F27" x1="360" y1="550" x2="372" y2="550"/>
  <rect x="372" y="545" width="8" height="10" fill="#EF9F27"/><text x="386" y="553.5" class="labU">14</text>
  <rect x="150" y="537" width="210" height="26" rx="5" fill="#FAEEDA" stroke="#EF9F27"/><text x="158" y="553.5" class="tg">Power-Gate (MOSFET → HW-038+Raindrop)</text>

  <rect x="372" y="585" width="8" height="10" fill="#D3D1C7"/><text x="386" y="593.5" class="lab">12 strap</text>

  <line class="w" stroke="#D4537E" x1="360" y1="630" x2="372" y2="630"/>
  <rect x="372" y="625" width="8" height="10" fill="#D4537E"/><text x="386" y="633.5" class="labU">13</text>
  <rect x="150" y="617" width="210" height="26" rx="5" fill="#FBEAF0" stroke="#D4537E"/><text x="158" y="633.5" class="tg">Servo SG90 · PWM (LEDC)</text>

  <line class="w" stroke="#5F5E5A" x1="360" y1="670" x2="372" y2="670"/>
  <rect x="372" y="665" width="8" height="10" fill="#5F5E5A"/><text x="386" y="673.5" class="labU">GND</text>
  <rect x="150" y="657" width="210" height="26" rx="5" fill="#F1EFE8" stroke="#5F5E5A"/><text x="158" y="673.5" class="tg">GND → gemeinsame Masse</text>

  <line class="w" stroke="#993C1D" x1="360" y1="710" x2="372" y2="710"/>
  <rect x="372" y="705" width="8" height="10" fill="#993C1D"/><text x="386" y="713.5" class="labU">VIN</text>
  <rect x="150" y="697" width="210" height="26" rx="5" fill="#FAECE7" stroke="#993C1D"/><text x="158" y="713.5" class="tg">5V (VIN) → Servo-Schiene (+ Elko)</text>

  <!-- RIGHT PINS -->
  <rect x="520" y="145" width="8" height="10" fill="#D3D1C7"/><text x="514" y="153.5" text-anchor="end" class="lab">23</text>

